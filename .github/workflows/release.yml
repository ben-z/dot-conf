name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: dot-conf
            archive: dot-conf-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: dot-conf
            archive: dot-conf-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: dot-conf
            archive: dot-conf-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: dot-conf.exe
            archive: dot-conf-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Create archive (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.archive }} ${{ matrix.bin }}
      - name: Create archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.bin }} -DestinationPath ${{ matrix.archive }}
      - name: Create checksum (unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256
      - name: Create checksum (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARCHIVE: ${{ matrix.archive }}
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 $env:ARCHIVE).Hash.ToLower()
          "$hash  $env:ARCHIVE" | Out-File -Encoding ascii "$env:ARCHIVE.sha256"
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          generate_release_notes: true
